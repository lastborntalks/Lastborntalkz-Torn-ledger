<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Ledger</title>
<style>
  :root{
    --bg: #050507;
    --bg-2: #0e0e13;
    --blue: #2f6bff;
    --blue-dim: #1c3f99;
    --red: #ff2d4d;
    --red-dim: #99162b;
    --green: #2ee65b;
    --green-dim: #157a33;
    --text: #f1f1f5;
    --text-dim: #8d8d9a;
    --border: #201f28;
    --input-bg: #0a0a0f;
  }
  [data-theme="light"]{
    --bg: #f4f4f7;
    --bg-2: #ffffff;
    --text: #14141a;
    --text-dim: #5b5b66;
    --border: #dcdce2;
    --input-bg: #ffffff;
  }
  [data-theme="light"] body{
    background: radial-gradient(circle at 20% 0%, #eceef5 0%, #f4f4f7 55%);
  }
  * { box-sizing: border-box; }
  body{
    margin:0;
    background: radial-gradient(circle at 20% 0%, #14141c 0%, #050507 55%), var(--bg);
    color:var(--text);
    font-family: -apple-system, Roboto, "Segoe UI", sans-serif;
    padding: 16px;
    padding-bottom: 80px;
  }
  h1{
    font-size: 1.3rem;
    letter-spacing: 0.03em;
    background: linear-gradient(90deg, var(--blue), var(--red));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0 0 4px 0;
  }
  .sub{ color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
  .card{
    background: linear-gradient(160deg, var(--bg-2), #0a0a0e);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  label{ font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:4px; }
  input, select{
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 6px;
    font-size: 0.95rem;
    margin-bottom: 10px;
  }
  input:focus, select:focus{ outline: 2px solid var(--blue); }
  button{
    background: linear-gradient(90deg, var(--blue), var(--red));
    color: #fff;
    border: none;
    padding: 12px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.9rem;
    width: 100%;
    margin-bottom: 8px;
  }
  button.secondary{
    background: transparent;
    border: 1px solid var(--blue-dim);
    color: var(--blue);
  }
  button.small{
    width: auto;
    padding: 6px 10px;
    font-size: 0.75rem;
  }
  .status{ font-size: 0.8rem; margin-top: 6px; color: var(--text-dim); }
  .status.ok{ color: var(--green); }
  .status.err{ color: var(--red); }
  table{
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  th, td{
    text-align: left;
    padding: 6px 4px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th{ color: var(--blue); font-weight: 700; }
  .scroll-x{ overflow-x: auto; }
  .profit-pos{ color: var(--green); }
  .profit-neg{ color: var(--red); }
  .tag{
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--input-bg);
    border: 1px solid var(--border);
  }
  .tag.buy{ color: var(--green); border-color: var(--green-dim); font-weight:700; }
  .tag.sell{ color: var(--red); border-color: var(--red-dim); font-weight:700; }
  .total-box{
    text-align: center;
    padding: 16px;
  }
  .total-box .amount{
    font-size: 1.8rem;
    font-family: monospace;
    font-weight: 700;
  }
  .total-box .label{ color: var(--text-dim); font-size: 0.8rem; }
  details summary{ cursor: pointer; color: var(--text-dim); font-size: 0.8rem; }
  .row-buttons{ display:flex; gap:8px; }
  .row-buttons button{ flex:1; }
  .empty{ color: var(--text-dim); font-size: 0.85rem; padding: 12px 0; text-align:center; }
</style>
</head>
<body>

<h1>TORN LEDGER</h1>
<div class="sub">Lastborn Creative — trading tracker</div>

<div class="card">
  <label for="apiKey">Torn API Key</label>
  <input type="text" id="apiKey" placeholder="Paste your API key">
  <div class="row-buttons">
    <button onclick="saveKey()">Save Key</button>
    <button class="secondary" onclick="syncFromTorn()">Sync Now</button>
  </div>
  <div id="syncStatus" class="status"></div>
</div>

<style>
  .stats-row{ display:flex; gap:12px; }
  .stats-row .card{ flex:1; margin-bottom:0; }
  .total-box{ text-align:left; }
  .total-box .amount{ font-size: 1.5rem; }
  .balance-amount{ font-size: 1.3rem; font-family: monospace; font-weight:700; color: var(--text); }
  .balance-networth{ font-size: 0.78rem; color: var(--text-dim); margin-top:2px; }
</style>

<div class="card">
  <label for="themeSelect" style="margin-bottom:6px;">Appearance</label>
  <select id="themeSelect" onchange="applyTheme(this.value)">
    <option value="system">System default</option>
    <option value="dark">Dark</option>
    <option value="light">Light</option>
  </select>
</div>

<div class="stats-row" style="margin-bottom:16px;">
  <div class="card total-box">
    <div class="label">TOTAL PROFIT / LOSS</div>
    <div class="amount" id="totalProfit">$0</div>
  </div>
  <div class="card total-box">
    <div class="label">MAIN ACCOUNT BALANCE</div>
    <div class="balance-amount" id="balanceAmount">—</div>
    <div class="balance-networth" id="balanceNetworth">(Net worth: —)</div>
  </div>
</div>

<div class="card">
  <label>Add entry manually</label>
  <select id="manType">
    <option value="buy">Buy</option>
    <option value="sell">Sell</option>
  </select>
  <select id="manSource">
    <option value="bazaar">Bazaar</option>
    <option value="itemmarket">Item Market</option>
    <option value="npc">NPC Shop</option>
    <option value="abroad">Foreign Store</option>
  </select>
  <input type="text" id="manItem" placeholder="Item name">
  <input type="number" id="manQty" placeholder="Quantity">
  <input type="number" id="manPrice" placeholder="Unit price ($)">
  <input type="text" id="manCounterparty" placeholder="Who from / sold to (optional)">
  <button onclick="addManualRow()">Add to Ledger</button>
</div>

<div class="card">
  <label>Foreign area codes — teach it once</label>
  <div class="row-buttons">
    <input type="number" id="areaCode" placeholder="Area # (e.g. 4)" style="margin-bottom:0;">
    <input type="text" id="areaName" placeholder="Country (e.g. South Africa)" style="margin-bottom:0;">
  </div>
  <button class="secondary" onclick="saveAreaLabel()" style="margin-top:8px;">Save Country Name</button>
  <div id="areaListBox" style="font-size:0.7rem; color:var(--text-dim); margin-top:6px;"></div>
</div>

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <strong style="color:var(--blue); font-size:0.85rem;">LEDGER</strong>
    <div class="row-buttons" style="width:auto; gap:6px;">
      <button class="small secondary" onclick="exportLedger()">Export</button>
      <button class="small secondary" onclick="document.getElementById('importFile').click()">Import</button>
      <input type="file" id="importFile" style="display:none" onchange="importLedger(event)">
    </div>
  </div>
  <div class="scroll-x">
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th><th>Type</th><th>Source</th><th>Item</th><th>Qty</th>
          <th>Unit $</th><th>Total $</th><th>Counterparty</th><th>Profit</th><th></th>
        </tr>
      </thead>
      <tbody id="ledgerBody"></tbody>
    </table>
    <div id="emptyMsg" class="empty" style="display:none;">No entries yet. Sync or add manually above.</div>
  </div>
</div>

<div class="card">
  <details>
    <summary>Unmatched log entries (raw, from last sync)</summary>
    <div id="unmatchedBox" style="margin-top:8px; font-size:0.7rem; color: var(--text-dim);"></div>
  </details>
</div>

<script>
let ledger = JSON.parse(localStorage.getItem('tornLedger') || '[]');
let areaLabels = JSON.parse(localStorage.getItem('tornAreaLabels') || '{}');
if(Object.keys(areaLabels).length === 0){
  areaLabels = { '4': 'South Africa' }; // seeded from confirmed report
  localStorage.setItem('tornAreaLabels', JSON.stringify(areaLabels));
}

// One-time cleanup: fix rows created before area labels / timestamps existed
(function migrateLedger(){
  let changed = false;
  ledger.forEach(r => {
    const oldFormat = /^Foreign Store \(Area (\d+)\)$/.exec(r.counterparty || '');
    if(oldFormat){
      const code = oldFormat[1];
      r.areaCode = code;
      r.counterparty = areaLabels[code] || ('Area ' + code + ' (unlabeled)');
      changed = true;
    }
    if(!r.ts){
      r.ts = Date.parse(r.date) || Date.now();
      changed = true;
    }
  });
  if(changed) localStorage.setItem('tornLedger', JSON.stringify(ledger));
})();
let nameCache = JSON.parse(localStorage.getItem('tornNameCache') || '{}');
document.getElementById('apiKey').value = localStorage.getItem('tornApiKey') || '';

function applyTheme(pref){
  localStorage.setItem('tornTheme', pref);
  let effective = pref;
  if(pref === 'system'){
    effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', effective);
}

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if((localStorage.getItem('tornTheme') || 'system') === 'system') applyTheme('system');
});

function renderBalance(bal){
  document.getElementById('balanceAmount').textContent = '$' + Number(bal.money_onhand).toLocaleString();
  document.getElementById('balanceNetworth').textContent = '(Net worth: $' + Number(bal.networth).toLocaleString() + ')';
}

async function fetchBalance(apiKey){
  try{
    const res = await fetch('https://api.torn.com/user/?selections=money,networth&key=' + encodeURIComponent(apiKey));
    const data = await res.json();
    if(data.error) return;
    const bal = { money_onhand: data.money_onhand, networth: data.networth?.total ?? 0 };
    localStorage.setItem('tornBalance', JSON.stringify(bal));
    renderBalance(bal);
  }catch(e){ /* silent — balance is a bonus, not critical to the sync */ }
}

function saveAreaLabel(){
  const code = document.getElementById('areaCode').value.trim();
  const name = document.getElementById('areaName').value.trim();
  if(!code || !name){ alert('Enter both the area number and country name.'); return; }
  areaLabels[code] = name;
  localStorage.setItem('tornAreaLabels', JSON.stringify(areaLabels));
  document.getElementById('areaCode').value = '';
  document.getElementById('areaName').value = '';
  renderAreaList();
  // retroactively relabel existing rows using this area code
  ledger.forEach(r => {
    if(r.areaCode === code){ r.counterparty = name; }
  });
  saveLedger();
}

// Maps common country names to ISO codes, so flags can be computed automatically
// for any country the user teaches the app via the area-code field.
const COUNTRY_TO_ISO = {
  'mexico':'MX','cayman islands':'KY','canada':'CA','hawaii':'US','united kingdom':'GB','uk':'GB',
  'argentina':'AR','switzerland':'CH','japan':'JP','china':'CN','uae':'AE','united arab emirates':'AE',
  'south africa':'ZA','nigeria':'NG','united states':'US','usa':'US','germany':'DE','france':'FR',
  'italy':'IT','spain':'ES','brazil':'BR','india':'IN','australia':'AU','russia':'RU','egypt':'EG',
  'kenya':'KE','ghana':'GH','ireland':'IE','portugal':'PT','netherlands':'NL','sweden':'SE',
  'norway':'NO','denmark':'DK','poland':'PL','south korea':'KR','thailand':'TH','vietnam':'VN'
};

function flagForCountry(name){
  const iso = COUNTRY_TO_ISO[(name||'').trim().toLowerCase()];
  if(!iso) return '';
  // Converts a 2-letter ISO code into its flag emoji using regional indicator symbols
  return iso.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
}
function renderAreaList(){
  const entries = Object.entries(areaLabels);
  document.getElementById('areaListBox').innerHTML = entries.length
    ? 'Known: ' + entries.map(([c,n]) => `Area ${c} = ${flagForCountry(n)} ${n}`).join(' · ')
    : 'None saved yet.';
}

function saveKey(){
  const key = document.getElementById('apiKey').value.trim();
  localStorage.setItem('tornApiKey', key);
  setStatus('Key saved.', true);
}

function setStatus(msg, ok){
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'status ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
}

function saveLedger(){
  localStorage.setItem('tornLedger', JSON.stringify(ledger));
  render();
}

// Titles that are known noise — never transactions, skip silently, never show as unmatched
const IGNORE_PATTERNS = [
  'bazaar add','bazaar favorite','bazaar remove',
  'hospital','successful login','api key add','api key remove',
  'trade money','trade expire','trade item','trade cancel',
  'travel depart','travel arrive','travel fee',
  'gym train','item use','attack ','crime ','stock buy','stock sell',
  'racket','organized crime','chain','education','medical','mail','hunting'
];

function isNoise(title){
  return IGNORE_PATTERNS.some(p => title.includes(p));
}

async function getItemCatalog(apiKey){
  const cached = localStorage.getItem('tornItemCatalog');
  const cachedAt = Number(localStorage.getItem('tornItemCatalogAt') || 0);
  const oneWeek = 7 * 24 * 60 * 60 * 1000;
  if(cached && (Date.now() - cachedAt) < oneWeek){
    return JSON.parse(cached);
  }
  const res = await fetch('https://api.torn.com/torn/?selections=items&key=' + encodeURIComponent(apiKey));
  const data = await res.json();
  if(data.error || !data.items) return cached ? JSON.parse(cached) : {};
  const map = {};
  for(const id in data.items){ map[id] = data.items[id].name; }
  localStorage.setItem('tornItemCatalog', JSON.stringify(map));
  localStorage.setItem('tornItemCatalogAt', String(Date.now()));
  return map;
}

function itemName(catalog, id){
  return catalog[id] || ('Item #' + id);
}

async function resolveNames(apiKey){
  const idsNeeded = [...new Set(
    ledger.filter(r => r.counterpartyId).map(r => r.counterpartyId)
  )].filter(id => !nameCache[id]);

  const cap = idsNeeded.slice(0, 25); // stay well under Torn's 100/min limit per sync
  for(const id of cap){
    try{
      const res = await fetch(`https://api.torn.com/user/${id}?selections=basic&key=${encodeURIComponent(apiKey)}`);
      const d = await res.json();
      if(d.name) nameCache[id] = d.name;
    }catch(e){ /* skip, keep going */ }
    await new Promise(r => setTimeout(r, 300));
  }
  localStorage.setItem('tornNameCache', JSON.stringify(nameCache));
  return idsNeeded.length - cap.length; // how many still remain unresolved
}

function playerLink(id){
  const name = nameCache[id];
  const label = name ? `${escapeHtml(name)} [${id}]` : `#${id}`;
  return `<a href="https://www.torn.com/profiles.php?XID=${id}" target="_blank" style="color:var(--blue)">${label}</a>`;
}

async function syncFromTorn(){
  const apiKey = document.getElementById('apiKey').value.trim();
  if(!apiKey){ setStatus('Enter your API key first.', false); return; }
  localStorage.setItem('tornApiKey', apiKey);
  setStatus('Fetching item catalog…');

  try{
    const catalog = await getItemCatalog(apiKey);
    fetchBalance(apiKey); // runs independently, doesn't block log parsing

    setStatus('Syncing log…');
    const res = await fetch('https://api.torn.com/user/?selections=log&key=' + encodeURIComponent(apiKey));
    const data = await res.json();
    if(data.error){
      setStatus('Torn API error: ' + data.error.error, false);
      return;
    }

    const unmatched = [];
    let added = 0;

    for(const id in data.log){
      const entry = data.log[id];
      const rawTitle = entry.title || '';
      const title = rawTitle.toLowerCase();
      const d = entry.data || {};
      const date = new Date(entry.timestamp * 1000).toISOString().slice(0,10);

      if(isNoise(title)) continue;

      let type = null, source = null, counterpartyId = null, counterparty = 'Unknown';

      if(title === 'bazaar sell'){
        type = 'sell'; source = 'bazaar'; counterpartyId = d.buyer; counterparty = 'Player #' + d.buyer;
      } else if(title === 'bazaar buy'){
        type = 'buy'; source = 'bazaar'; counterpartyId = d.seller; counterparty = 'Player #' + d.seller;
      } else if(title.includes('item market') && title.includes('sell')){
        type = 'sell'; source = 'itemmarket'; counterparty = 'Item Market';
      } else if(title.includes('item market') && title.includes('buy')){
        type = 'buy'; source = 'itemmarket'; counterparty = 'Item Market';
      } else if(title.includes('shop') || title.includes('store')){
        type = 'buy'; source = 'npc'; counterparty = 'NPC';
      } else if(title === 'item abroad buy'){
        type = 'buy'; source = 'abroad';
        counterparty = areaLabels[String(d.area)] || ('Area ' + d.area + ' (unlabeled)');
      }

      if(!type){
        unmatched.push({title: rawTitle, timestamp: date, data: d});
        continue;
      }

      const items = Array.isArray(d.items) ? d.items : [{id: d.item, qty: d.quantity || 1}];
      const unitCost = Number(d.cost_each ?? d.cost ?? d.price ?? 0);
      const ts = entry.timestamp * 1000;

      for(const it of items){
        const uid = 'sync-' + id + '-' + it.id;
        if(ledger.some(r => r.syncId === uid)) continue;

        ledger.push({
          syncId: uid, date, ts, type, source,
          item: itemName(catalog, it.id),
          qty: Number(it.qty) || 1,
          unitPrice: unitCost,
          counterparty,
          counterpartyId: counterpartyId || null,
          areaCode: source === 'abroad' ? String(d.area) : null
        });
        added++;
      }
    }

    document.getElementById('unmatchedBox').innerHTML = unmatched.length
      ? unmatched.map(u => `<div style="margin-bottom:6px;">[${u.timestamp}] "${escapeHtml(u.title)}"<br>${escapeHtml(JSON.stringify(u.data))}</div>`).join('')
      : 'None — everything recognized matched a known pattern.';

    setStatus('Resolving trader names…');
    const remaining = await resolveNames(apiKey);

    saveLedger();
    setStatus(`Synced. ${added} new line(s) added, ${unmatched.length} unrecognized.` +
      (remaining > 0 ? ` ${remaining} trader name(s) left to resolve — sync again to continue.` : ''), true);

  }catch(err){
    setStatus('Fetch failed: ' + err.message + '. Check your key and connection.', false);
  }
}

function addManualRow(){
  const type = document.getElementById('manType').value;
  const source = document.getElementById('manSource').value;
  const item = document.getElementById('manItem').value.trim();
  const qty = Number(document.getElementById('manQty').value);
  const unitPrice = Number(document.getElementById('manPrice').value);
  const counterparty = document.getElementById('manCounterparty').value.trim() || (source === 'npc' ? 'NPC' : 'Unknown');

  if(!item || !qty || !unitPrice){
    alert('Fill in item, quantity, and unit price.');
    return;
  }

  ledger.push({
    syncId: 'manual-' + Date.now(),
    date: new Date().toISOString().slice(0,10),
    ts: Date.now(),
    type, source, item, qty, unitPrice, counterparty
  });

  document.getElementById('manItem').value = '';
  document.getElementById('manQty').value = '';
  document.getElementById('manPrice').value = '';
  document.getElementById('manCounterparty').value = '';

  saveLedger();
}

function deleteRow(syncId){
  ledger = ledger.filter(r => r.syncId !== syncId);
  saveLedger();
}

function avgCost(item){
  const buys = ledger.filter(r => r.type === 'buy' && r.item.toLowerCase() === item.toLowerCase());
  const totalQty = buys.reduce((s,r) => s + r.qty, 0);
  const totalCost = buys.reduce((s,r) => s + r.qty * r.unitPrice, 0);
  return totalQty ? totalCost / totalQty : null;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function counterpartyDisplay(row){
  if(row.counterpartyId) return playerLink(row.counterpartyId);
  if(row.source === 'abroad'){
    const flag = flagForCountry(row.counterparty);
    return (flag ? flag + ' ' : '') + escapeHtml(row.counterparty);
  }
  return escapeHtml(row.counterparty);
}

function render(){
  const body = document.getElementById('ledgerBody');
  const empty = document.getElementById('emptyMsg');
  body.innerHTML = '';

  if(ledger.length === 0){
    empty.style.display = 'block';
    document.getElementById('totalProfit').textContent = '$0';
    return;
  }
  empty.style.display = 'none';

  const sorted = [...ledger].sort((a,b) => {
    const tA = a.ts || Date.parse(a.date) || 0;
    const tB = b.ts || Date.parse(b.date) || 0;
    return tB - tA; // newest first
  });
  let totalProfit = 0;

  for(const row of sorted){
    const total = row.qty * row.unitPrice;
    let profitCell = '—';
    if(row.type === 'sell'){
      const cost = avgCost(row.item);
      const hasCostRecord = cost !== null;
      const effectiveCost = hasCostRecord ? cost : 0; // no buy on record = treated as free (crime drop, pre-existing stock, etc.)
      const profit = (row.unitPrice - effectiveCost) * row.qty;
      totalProfit += profit;
      const noteTag = hasCostRecord ? '' : ` <span class="tag" title="No matching buy in your ledger — full sale counted as profit">no buy record</span>`;
      profitCell = `<span class="${profit >= 0 ? 'profit-pos' : 'profit-neg'}">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</span>${noteTag}`;
    }

    body.innerHTML += `<tr>
      <td>${row.date}</td>
      <td><span class="tag ${row.type}">${row.type.toUpperCase()}</span></td>
      <td>${row.source}</td>
      <td>${escapeHtml(row.item)}</td>
      <td>${row.qty}</td>
      <td>$${row.unitPrice.toFixed(2)}</td>
      <td>$${total.toFixed(2)}</td>
      <td>${counterpartyDisplay(row)}</td>
      <td>${profitCell}</td>
      <td><button class="small secondary" onclick="deleteRow('${row.syncId}')">✕</button></td>
    </tr>`;
  }

  document.getElementById('totalProfit').textContent =
    (totalProfit >= 0 ? '+$' : '-$') + Math.abs(totalProfit).toFixed(2);
  document.getElementById('totalProfit').style.color = totalProfit >= 0 ? 'var(--green)' : 'var(--red)';
}

function exportLedger(){
  const blob = new Blob([JSON.stringify(ledger, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'torn-ledger-backup.json';
  a.click();
}

function importLedger(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('bad format');
      ledger = imported;
      saveLedger();
      setStatus('Ledger imported.', true);
    }catch(err){
      setStatus('Import failed: file is not a valid ledger export.', false);
    }
  };
  reader.readAsText(file);
}
// --- Initialization: runs last, after every function/const above is defined ---
renderAreaList();

const savedTheme = localStorage.getItem('tornTheme') || 'system';
document.getElementById('themeSelect').value = savedTheme;
applyTheme(savedTheme);

const cachedBalance = JSON.parse(localStorage.getItem('tornBalance') || 'null');
if(cachedBalance) renderBalance(cachedBalance);

render();
</script>
